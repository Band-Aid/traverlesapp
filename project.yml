name: JALReimagined
options:
  bundleIdPrefix: com.jalhack
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  JALReimagined:
    type: application
    platform: iOS
    sources:
      - path: JALReimagined
    info:
      path: JALReimagined/Info.plist
      properties:
        CFBundleDisplayName: JAL
        CFBundleShortVersionString: "1.0"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: "Used to show where you are in the terminal and suggest the fastest route to your gate."
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.jalhack.refresh
        LSApplicationQueriesSchemes:
          - uber
          - uberauth
        AeroDataBoxAPIKey: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jalhack.JALReimagined
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
